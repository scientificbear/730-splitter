<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>730 XML Splitter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>730 XML Splitter</h1>
        <p class="subtitle">
          Suddivide un file fornitura 730-4 (.rel) in un file per ogni sostituto d'imposta.
        </p>
      </header>

      <section class="card">
        <label class="file-label" for="file-input">Seleziona file .rel</label>
        <input type="file" id="file-input" accept=".rel,.xml" />
        <p id="file-name" class="file-name" aria-live="polite"></p>

        <div class="actions">
          <button type="button" id="process-btn" disabled>Elabora</button>
          <button type="button" id="download-btn" hidden>Scarica ZIP</button>
          <button type="button" id="clear-btn" class="btn-secondary" hidden>Nuovo file</button>
        </div>

        <div id="results" class="results" hidden>
          <p id="results-heading" class="results-heading"></p>
          <ul id="results-list" class="results-list"></ul>
        </div>

        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <p class="privacy">Il file resta sul tuo dispositivo; nulla viene inviato al server.</p>
    </main>

    <footer class="site-footer">
      <a
        class="footer-link"
        href="https://github.com/scientificbear/730-splitter/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg class="footer-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path
            fill="currentColor"
            d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
          />
        </svg>
        Source code on GitHub
      </a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
