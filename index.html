<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f3d7a" />
    <title>730 XML Splitter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>

    <main class="container">
      <header class="page-header">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="8" width="28" height="36" rx="3" fill="currentColor" opacity="0.15" />
            <rect x="10" y="4" width="28" height="36" rx="3" fill="currentColor" opacity="0.35" />
            <rect x="16" y="10" width="28" height="36" rx="3" fill="currentColor" />
            <path
              d="M26 22h8M26 28h8M26 34h5"
              stroke="#fff"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <div class="header-text">
          <h1>730 XML Splitter</h1>
          <p class="subtitle">
            Suddivide un file fornitura 730-4 (.rel) in un file per ogni sostituto d'imposta.
          </p>
        </div>
      </header>

      <section class="card">
        <div class="card-section">
          <h2 class="section-title">1. Carica il file</h2>

          <label class="dropzone" id="dropzone" for="file-input">
            <input type="file" id="file-input" accept=".rel,.xml" hidden />
            <span class="dropzone-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                <path
                  d="M12 16V4m0 0L8 8m4-4 4 4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <span class="dropzone-title">Trascina qui il file .rel</span>
            <span class="dropzone-hint">oppure clicca per selezionarlo</span>
            <p id="file-name" class="file-name" aria-live="polite"></p>
          </label>
        </div>

        <div class="card-section">
          <h2 class="section-title">2. Elabora e scarica</h2>

          <div class="actions">
            <button type="button" id="process-btn" disabled>
              <svg
                class="btn-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <path
                  d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <polyline points="14 2 14 8 20 8" stroke-linecap="round" stroke-linejoin="round" />
                <line x1="16" y1="13" x2="8" y2="13" stroke-linecap="round" />
                <line x1="16" y1="17" x2="8" y2="17" stroke-linecap="round" />
              </svg>
              <span class="btn-label">Elabora</span>
            </button>
            <button type="button" id="download-btn" class="btn-success" hidden>
              <svg
                class="btn-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <path
                  d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <polyline
                  points="7 10 12 15 17 10"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <line x1="12" y1="15" x2="12" y2="3" stroke-linecap="round" />
              </svg>
              Scarica ZIP
            </button>
            <button type="button" id="clear-btn" class="btn-secondary" hidden>
              <svg
                class="btn-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <path
                  d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              Nuovo file
            </button>
          </div>

          <div id="status" class="status" aria-live="polite" hidden></div>
        </div>

        <div id="results" class="results" hidden>
          <div class="results-header">
            <svg
              class="results-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <path
                d="M22 11.08V12a10 10 0 1 1-5.93-9.14"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <polyline
                points="22 4 12 14.01 9 11.01"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <p id="results-heading" class="results-heading"></p>
          </div>
          <ol id="results-list" class="results-list"></ol>
        </div>
      </section>

      <p class="privacy">
        <svg
          class="privacy-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <rect
            x="3"
            y="11"
            width="18"
            height="11"
            rx="2"
            ry="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Il file resta sul tuo dispositivo; nulla viene inviato al server.
      </p>
    </main>

    <footer class="site-footer">
      <a
        class="footer-link"
        href="https://github.com/scientificbear/730-splitter/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg class="footer-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path
            fill="currentColor"
            d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
          />
        </svg>
        Source code on GitHub
      </a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
